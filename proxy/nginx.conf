# nginx reverse proxy for the Bloom2 staging stack.
#
# This is the single entry point for the browser. It routes by path prefix
# to the internal-only services on the Compose network:
#
#   /api/          → backend (FastAPI)          — strip /api prefix
#   /ws/           → backend (voice WebSocket)  — pass path unchanged
#   /chat-ws/      → backend (Socket.io chat)   — pass path unchanged
#   /practitioner  → practitioner (Next.js)     — pass path unchanged
#   /              → frontend (Expo web SPA)    — catch-all
#
# Only this proxy exposes a host port (mapped in docker-compose). All other
# services are internal-only. This eliminates CORS issues and hardcoded URLs
# — the browser always talks to one origin.
#
# Replaces the entire default nginx.conf (mounted at /etc/nginx/nginx.conf)
# so we have full control over the http{} context for the `map` directive.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Map the Upgrade header to the Connection header value. This is the
    # standard nginx pattern for WebSocket proxying — the "Connection" header
    # is hop-by-hop and must be set explicitly based on whether the client
    # requested a protocol upgrade.
    # See: https://nginx.org/en/docs/http/websocket.html
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Gzip text-based responses proxied through to the browser.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # Allow large file uploads — health documents (PDFs/images) sent to
    # /api/upload-doc. The default 1MB is too small.
    client_max_body_size 50M;

    # Access/error logs to stdout so `docker compose logs proxy` works.
    access_log /dev/stdout;
    error_log /dev/stderr warn;

    server {
        listen 80;
        server_name _;

        # ── REST API ──────────────────────────────────────────────────
        # Strip the /api/ prefix and forward to the FastAPI backend.
        # The trailing slash on proxy_pass tells nginx to strip the
        # location prefix:
        #   /api/health          → http://backend:8000/health
        #   /api/dashboard/today → http://backend:8000/dashboard/today
        location /api/ {
            proxy_pass http://backend:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Voice WebSocket ───────────────────────────────────────────
        # /ws/{user_id}/{session_id} — bidirectional 16kHz PCM audio
        # streaming for the Gemini Live API voice assistant. Sessions can
        # last many minutes, so use a long read/send timeout.
        # No URI in proxy_pass → path passed unchanged to the backend.
        location /ws/ {
            proxy_pass http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── Socket.io chat ────────────────────────────────────────────
        # /chat-ws/socket.io/ — Socket.io engine for real-time text chat.
        # Uses both HTTP polling (initial) and WebSocket transports.
        # proxy_read_timeout must exceed Socket.io's pingInterval +
        # pingTimeout (25s + 20s = 45s default), or nginx closes idle
        # connections and the client gets "transport close" errors.
        # No URI in proxy_pass → path passed unchanged to the backend.
        location /chat-ws/ {
            proxy_pass http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # ── Practitioner Next.js app ──────────────────────────────────
        # Served at /practitioner/ (basePath set in next.config.ts).
        # Do NOT strip the prefix — Next.js expects /practitioner in the
        # URL. Using proxy_pass without a URI passes the path unchanged:
        #   /practitioner/login              → http://practitioner:3000/practitioner/login
        #   /practitioner/_next/static/...   → http://practitioner:3000/practitioner/_next/static/...
        # WebSocket headers included for safety (HMR in dev); the
        # practitioner's Socket.io chat connects via /chat-ws/ above, not
        # through this location.
        location /practitioner {
            proxy_pass http://practitioner:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Frontend (Expo web SPA) ───────────────────────────────────
        # Catch-all: everything else goes to the static SPA container,
        # which has its own nginx serving the Expo web export with an SPA
        # fallback for client-side routing.
        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
