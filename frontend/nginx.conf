# nginx config for serving the Expo web SPA build of the Bloom2 patient app.
#
# `expo export -p web` with `web.output: "single"` produces a static SPA:
# a single index.html plus hashed JS/CSS/image assets under dist/. This
# config serves those files and falls back to index.html for any path
# that doesn't match a real file, so client-side routing works.
#
# This container is internal-only — the nginx reverse proxy (Phase 5)
# routes `/` to it. It listens on port 80 inside the container.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip text assets.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # Static assets get long-lived cache headers (filenames are content-hashed).
    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: serve the real file if it exists, otherwise index.html
    # so the client-side router can handle the path.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
